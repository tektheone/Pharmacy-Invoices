name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Print versions
        run: |
          node -v
          npm -v
      - name: Phase 1 placeholder
        run: echo "CI scaffold ready. Build/test steps will be added in later phases."


