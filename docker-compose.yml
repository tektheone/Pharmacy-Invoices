version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pharmacy-postgres
    environment:
      POSTGRES_DB: pharmacy_invoices
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pharmacy_invoices"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:


